<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Verified | DraftMyForms</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f8fafc;display:flex;
     align-items:center;justify-content:center;min-height:100vh}
.card{background:#fff;border-radius:16px;padding:48px 40px;text-align:center;
      max-width:440px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:24px;font-weight:700;color:#1a1a1a;margin-bottom:12px}
p{color:#666;font-size:15px;line-height:1.6;margin-bottom:24px}
.btn{display:inline-block;background:#2563eb;color:#fff;padding:14px 32px;
     border-radius:8px;font-weight:600;font-size:15px;text-decoration:none;
     transition:background 0.2s}
.btn:hover{background:#1d4ed8}
.error{color:#ef4444}
.spinner{display:inline-block;width:40px;height:40px;border:4px solid #e2e8f0;
         border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <p style="margin-top:16px;color:#666">Verifying your email...</p>
</div>

<script>
const SUPABASE_URL = 'https://mupeqeuuwdmkndvtbhzb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11cGVxZXV1d2Rta25kdnRiaHpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNzkwNDMsImV4cCI6MjA4Njk1NTA0M30.RqnIoFp18fDHzGgABpoLLkLCn1oVJioqk4yKiWnOAbA';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function handleVerification() {
  const card = document.getElementById('card');

  try {
    // Supabase puts token_hash + type in URL hash or query params
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash || window.location.search);
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');
    const type = params.get('type');
    const token_hash = params.get('token_hash');
    const error = params.get('error_description') || params.get('error');

    if (error) {
      card.innerHTML = `
        <div class="icon">❌</div>
        <h1 class="error">Verification Failed</h1>
        <p>${error}</p>
        <a href="/index.html" class="btn">Back to Home</a>`;
      return;
    }

    // Handle token-based verification (newer Supabase)
    if (token_hash && type) {
      const { error: verifyErr } = await sb.auth.verifyOtp({ token_hash, type });
      if (verifyErr) throw verifyErr;
    }

    // Handle access_token in URL (older flow)
    if (access_token) {
      await sb.auth.setSession({ access_token, refresh_token });
    }

    // Check current session
    const { data: { session } } = await sb.auth.getSession();

    if (session) {
      card.innerHTML = `
        <div class="icon">✅</div>
        <h1>Email Verified!</h1>
        <p>Your email has been confirmed. You're all set to start creating professional documents.</p>
        <a href="/dashboard.html" class="btn">Go to Dashboard</a>`;

      // Auto-redirect after 3 seconds
      setTimeout(() => { window.location.href = '/dashboard.html'; }, 3000);
    } else {
      card.innerHTML = `
        <div class="icon">✅</div>
        <h1>Email Verified!</h1>
        <p>Your account has been confirmed. Please sign in to continue.</p>
        <a href="/index.html#login" class="btn">Sign In</a>`;

      setTimeout(() => { window.location.href = '/index.html#login'; }, 3000);
    }

  } catch (err) {
    card.innerHTML = `
      <div class="icon">⚠️</div>
      <h1>Something went wrong</h1>
      <p>${err.message || 'Verification could not be completed. The link may have expired.'}</p>
      <a href="/index.html" class="btn">Back to Home</a>`;
  }
}

handleVerification();
</script>
</body>
</html>
